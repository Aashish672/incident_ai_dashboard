name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install flake8 isort
      - name: Run flake8
        run: flake8 --max-line-length=120 --exclude=migrations,venv,node_modules .
      - name: Check import ordering
        run: isort --check-only --diff .

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_incident_ai
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: test-secret-key-for-ci-only
      DEBUG: "True"
      DB_NAME: test_incident_ai
      DB_USER: postgres
      DB_PASSWORD: testpass
      DB_HOST: localhost
      DB_PORT: "5432"
      EMAIL_HOST_USER: ""
      EMAIL_HOST_PASSWORD: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run migrations
        run: python manage.py migrate
      - name: Run tests
        run: python manage.py test --verbosity=2

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t incident-ai-dashboard .
      - name: Verify container starts
        run: |
          docker run -d --name test-container \
            -e SECRET_KEY=test-key \
            -e DEBUG=True \
            -e DB_NAME=test \
            -e DB_HOST=localhost \
            -p 8000:8000 \
            incident-ai-dashboard || true
          sleep 5
          docker logs test-container
          docker stop test-container || true
